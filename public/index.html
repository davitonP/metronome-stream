<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secuencias de Audio</title>
    <link rel="stylesheet" href="/assets/css/output.css">
</head>
<body class="h-full bg-gray-50">
    <!-- Overlay para cerrar sidebar en móvil -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
    
    <div class="flex h-full relative">
        <!-- Botón hamburguesa para móviles -->
        <button id="menu-toggle" class="fixed top-4 left-4 z-50 lg:hidden bg-white p-2 rounded-lg shadow-lg">
            <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-80 bg-white border-r border-gray-200 flex flex-col shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-6 border-b border-gray-200 flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">🎵 Secuencias</h1>
                </div>
                <!-- Botón cerrar en móvil -->
                <button id="sidebar-close" class="lg:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Canciones Disponibles</h2>
                <ul id="songs-list" class="space-y-2"></ul>
            </div>
            
            
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto w-full lg:w-auto">
            <div class="max-w-4xl mx-auto p-4 lg:p-8 pt-16 lg:pt-8">
                <div class="flex flex-row bg-white rounded-lg shadow-sm p-6 mb-6">
                    <div class="flex flex-col flex-grow">
                        <h1 class="text-3xl font-bold text-gray-900 mb-2">Cuan grande es Dios</h1>
                        <p id="time" class="text-gray-600">C mayor - 72bpm</p>
                    </div>
                    <div class="flex flex-col">
                            <button id="start" disabled 
                                class="w-full px-15 py-1 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed">
                                ▶ Comenzar
                            </button>
                            <button id="pause" 
                                class="w-full px-4 py-1 bg-orange-600 text-white font-medium rounded-lg hover:bg-orange-700 transition-colors">
                                ⏸ Pausar
                            </button>
                    </div>
                </div>
                
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h2 class="text-xl font-semibold text-gray-900 mb-4">Letras</h2>
                    <div>
                        <ul id="letras-list" class="list-disc list-inside space-y-2">
                            <li class="text-gray-600">Cargando...</li>
                            <li class="text-gray-600">Cargando...</li>
                        </ul>
                    </div>
                    <!-- <div class="space-y-3">
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                            <span class="text-gray-700 font-medium">Estado:</span>
                            <span id="status" class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-medium">Conectado</span>
                        </div>
                        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                            <span class="text-gray-700 font-medium">Canción actual:</span>
                            <span id="current-song" class="text-gray-600">Ninguna</span>
                        </div>
                    </div> -->
                </div>
            </div>
            <!-- <div class="p-6 border-t border-gray-200 bg-gray-50">
                <h2 class="text-sm font-semibold text-gray-700 mb-3">Reproductor</h2>
                <audio id="audio-player" controls class="w-full">
                    Tu navegador no soporta el elemento de audio.
                </audio>
            </div> -->
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/assets/js/client-webaudio.js"></script>
    <script src="/assets/js/canciones.js"></script>
    <!-- <script src="/assets/js/metronomo.js"></script> -->
    <script>
        // Toggle sidebar en móviles
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebarClose = document.getElementById('sidebar-close');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }

        menuToggle.addEventListener('click', openSidebar);
        sidebarClose.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
